<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Webserv 42 - Upload</title>
        <link rel="stylesheet" href="css/styles.global.css">
        <style>
            .upload-box {
                max-width: 200px;
                margin: 60px auto;
                background-color: white;
                color:#333;
                padding: 35px;
                border: 1px solid #333;
                border-radius: 8px;
                text-align: center;
            }

            .upload-box h2 {
                font-size: 25px;
                margin-top: 0;
                margin-bottom: 15px;
            }
            
            label {
                
                margin: 15px;
                font-weight: bold;
                color: #555;
            }

            .form-group {
                margin-bottom: 15px;
                border: 2px dashed;
                padding: 15px;
            }

            .upload-button {
                padding: 10px 18px;
                border: none;
                border-radius: 7px;
                background-color: #333;
                color: white;
                cursor: pointer;
            }

            .upload-button:hover {
                background-color: #555;
            }

        </style>
    </head>
    <body>
        <header>
            <h1>Webserver 42</h1>
        </header>
        <nav>
            <a href="/index.html">Home</a>
            <a href="/upload.html">Upload</a>
            <a href="">Uploud list</a>
        </nav>
        <main>
            <div class="upload-box">
                <h2>Upload Files</h2>
                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="file">Select a File</label>
                        <input type="file" id="file" name="file">
                    </div>
                    <button class="upload-button" type="submit">Upload</button>
                </form>
            </div>
        </main>
        <footer>
			<p>&copy; 2026 Webserver 42</p>
		</footer>
    </body>
</html>
