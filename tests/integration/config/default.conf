service {
    listen 127.0.0.1:8090;

    location /post {
        root ./server_files/;
        upload on;
        methods POST GET DELETE;
    }

    location /scripts {
        root ./server_files/;
        methods GET POST;
        cgi .py /usr/bin/python3;
        cgi .php /usr/bin/php;
        cgi .lua /usr/bin/lua;
        cgi .sh /usr/bin/sh;
    }
	location /scripts {
		methods GET POST;
		upload on;
		root ./server_files/;
		cgi .py /usr/bin/python3;
		cgi .php /usr/bin/php-cgi;
		cgi .lua /usr/bin/lua;
	}

    location /scripts {
	methods GET POST;
	upload on;
	root ./server_files/;
	cgi .py /usr/bin/python3;
	cgi .php /usr/bin/php-cgi;
	cgi .lua /usr/bin/lua;
    }

    location /scripts {
	methods GET POST;
	upload on;
	root ./server_files/;
	cgi .py /usr/bin/python3;
	cgi .php /usr/bin/php-cgi;
	cgi .lua /usr/bin/lua;
    }

    location /null_content_size {
	methods POST;
	upload on;
	root ./server_files/;
	max_body_size 100;
    }
}
