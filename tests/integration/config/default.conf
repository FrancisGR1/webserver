service {
	listen 127.0.0.1:8080;
	location / {
		root /home/frmiguel/webserv/tests/integration/server_files/;
		methods GET;
		default_file hello_world.html;
	}

	location /get {
		root /home/frmiguel/webserv/tests/integration/server_files/get/;
		methods GET;
		default_file hello_world.html;
	}

	location /post {
		root /home/frmiguel/webserv/tests/integration/server_files/post/;
		methods POST;
	}

	location /delete {
		root /home/frmiguel/webserv/tests/integration/server_files/delete/;
		methods DELETE;
	}
}
