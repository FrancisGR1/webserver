service {
    listen 127.0.0.1:8091;
    listen 127.0.0.1:8092;
    listen 127.0.0.1:8093;
    listen 127.0.0.1:8094;
    listen 127.0.0.1:8095;
    listen 127.0.0.1:8096;

    error_page 404 ./server_files/errors/404.html;

    location / {
        root ./server_files/;
        methods GET;
	listing on;
    }

    location /post {
        root ./server_files/;
        upload on;
        methods POST GET DELETE;
    }

    location /scripts {
        root ./server_files/;
        methods GET POST;
        cgi .py /usr/bin/python3;
        cgi .php /usr/bin/php;
        cgi .lua /usr/bin/lua;
        cgi .sh /usr/bin/sh;
    }

    location /null_content_size {
	methods POST;
	upload on;
	root ./server_files/;
	max_body_size 100;
    }

    location /scripts/bad {
    	methods GET POST;
    	root ./server_files/;
    	cgi .py /usr/bin/nonexistent_python;
    	cgi .php /usr/bin/nonexistent_php;
    	cgi .lua /usr/bin/nonexistent_lua;
    }

    location /redir {
	methods GET;
    	return 301 https://en.wikipedia.org/wiki/Special:Random;
	root ./server_files/;
    }

    location /errors {
	methods GET POST;
	upload on;
	max_body_size 100;
	root ./server_files/;
    }

    location /no_upload {
	methods POST;
	max_body_size 100;
    	upload off;
	root ./server_files/;
    }

    location /default {
	methods GET POST;
	default_file default.md;
	root ./server_files/;
    }

    location /listing {
	methods GET POST;
	listing on;
	root ./server_files/;
    }
}

