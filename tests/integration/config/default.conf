service {
    listen 127.0.0.1:8090;

    location /post {
        root ./server_files/;
        upload on;
        methods POST GET DELETE;
    }

    location /scripts {
        root ./server_files/;
        methods GET POST;
        cgi .py /usr/bin/python3;
        cgi .php /usr/bin/php;
        cgi .lua /usr/bin/lua;
        cgi .sh /usr/bin/sh;
    }
}
