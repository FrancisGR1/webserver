service {
	listen 127.0.0.1:8080;
	location / {
		root ./server_files/;
		methods GET;
		default_file hello_world.html;
	}

	location /get {
		root ./server_files/;
		methods GET;
		default_file hello_world.html;
	}

	location /post {
		root ./server_files/;
		methods POST;
	}

	location /delete {
		root ./server_files/;
		methods DELETE;
	}
}
