events {}

http {
    server {
        listen 8080;
        server_name localhost;

	location /scripts/ {
		alias /home/francisco/Documents/42_School/05/Webserv/tests/nginx/cgi-bin/scripts/;

		include /etc/nginx/fastcgi_params;
		fastcgi_pass unix:/run/fcgiwrap.socket;

		fastcgi_param SCRIPT_FILENAME $request_filename;
	}

	location /tmp {
		root /home/francisco/Documents/42_School/05/Webserv/tests/nginx/;
		autoindex on;
		index index.html;
		#return 301 https://example.com;
	}
	location /html {
		root /home/francisco/Documents/42_School/05/Webserv/tests/nginx/;
		index index.html;
	}
	location /html/tmp/www {
		root /home/francisco/Documents/42_School/05/Webserv/tests/nginx/;
		index index.html;
	}

	location /secret {
		root /home/francisco/Documents/42_School/05/Webserv/tests/nginx/html;
		autoindex on;
		index no_permission.html;
	}
}
}
