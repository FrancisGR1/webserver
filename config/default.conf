# default
service      {
    listen 127.0.0.1:8080;
    listen 127.0.0.2:8080;
    listen 127.0.0.3:8080;
    listen 127.0.0.4:8080;
    server_name main_server;
    max_body_size 1000000;   # service-wide
    error_page 404 /root/error.html;
    error_page 500 /errors/500.html;

    # root
    location / {
	    root ./root/;
	    methods GET POST DELETE;
	    default_file index.html;
	    listing on;
    }

    # upload
    location /uploads {
        methods POST DELETE GET;
        upload on;
        root ./root/;
        listing on;
    }

    # CGI
    location /cgi-bin {
        root ./root/;
        methods GET POST;
        cgi .py /usr/bin/python3;
        cgi .php /usr/bin/php-cgi;
    }

    location /wiki {
        methods GET;
        root ./root/;
        return 301 https://en.wikipedia.org/wiki/Special:Random;
    }
}

service {
   listen 127.0.0.4:8081;
   server_name secondary_server;
   max_body_size 1000000;        # service-wide
   error_page 400 tests/errors/400.html;
   error_page 404 tests/errors/404.html;
   error_page 500 tests/errors/500.html;

   location / 
   {
	    methods GET POST DELETE;
        root ./root/;
        default_file hello.html;
   }

   # root
   location /css {
	    methods GET POST DELETE;
	    root ./root/;
	    listing on;
   }

   # upload
   location /uploads {
       methods POST DELETE GET;
       root ./root/;
       upload on;
   }

    location /img {
        methods GET;
        root ./root/;
        listing on;
    }

   # CGI
   location /cgi-bin {
        root ./root/;
        methods GET POST;
        cgi .py /usr/bin/python3;
        cgi .php /usr/bin/php-cgi;
    }
}
